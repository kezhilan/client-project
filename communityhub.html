<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script defer src="scripts/script.js"></script>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>

<div data-include="components/header.html"></div>

<main>

    <h1>Community Hub</h1>
    <br>

    <section>
        <h2>Share Your Code</h2>

        <form id="postForm">
            <label>Username:</label><br>
            <input type="text" id="username" required><br><br>

            <label>Description:</label><br>
            <input type="text" id="description" required><br><br>

            <label>Your Code:</label><br>
            <textarea id="code" rows="6" required></textarea><br><br>

            <button type="submit" class="btn">Post Code</button>
        </form>

        <h3>My Posts</h3>
        <div id="myPosts"></div>
    </section>

    <section>
        <h2>Sample Community Posts</h2>
        <div id="communityPosts"></div>
    </section>

</main>

<div data-include="components/footer.html"></div>
<script src="scripts/HTMLInclude.min.js"></script>
</body>
</html>
